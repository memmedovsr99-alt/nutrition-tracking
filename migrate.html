async function sbUpsert(table, data, onConflict='') {

}

  { date: "2025-10-22", weight: 85.3, smm: 37.0, bfm: 20.5, pbf: 24.0, lbm: 64.8, tbw: 47.4, bmr: 1769, bmi: 27.0 },

];

async function runMigration() {
  document.getElementById('btn').disabled = true;
  document.getElementById('log').innerHTML = '';

  try {
    log('⟳ Inserting targets...');
    await sbUpsert('targets', TARGETS, 'id');
    log('✓ Targets done', 'ok');

    log('⟳ Clearing old nutrition_log & food_items...');
    await sbDelete('food_items', 'id=gte.0');
    await sbDelete('nutrition_log', 'calories=gte.0');
    log('✓ Old data cleared', 'ok');

    log(`⟳ Inserting ${LOG.length} days of nutrition log...`);
    const days = LOG.map(({ foods, ...d }) => d);
    await sbInsert('nutrition_log', days);
    log('✓ nutrition_log done', 'ok');

    log('⟳ Inserting food items...');
    const allFoods = [];
    LOG.forEach(entry => {
      entry.foods.forEach((f, i) => {
        allFoods.push({ ...f, date: entry.date, sort_order: i });
      });
    });
    // Insert in batches of 100
    for (let i = 0; i < allFoods.length; i += 100) {
      await sbInsert('food_items', allFoods.slice(i, i + 100));
    }
    log(`✓ ${allFoods.length} food items done`, 'ok');

    log('⟳ Inserting weight log...');
    await sbUpsert('weight_log', WEIGHT_LOG, 'date');
    log('✓ Weight log done', 'ok');

    log('⟳ Inserting InBody scans...');
    await sbUpsert('inbody_scans', INBODY_SCANS, 'date');
    log('✓ InBody scans done', 'ok');

    log('', 'info');
    log('✅ Migration complete! You can now delete this file.', 'ok');
  } catch(e) {
    log(`❌ Error: ${e.message}`, 'err');
    log('Check the Supabase SQL editor — tables may not be created yet.', 'info');
    document.getElementById('btn').disabled = false;
  }
}
